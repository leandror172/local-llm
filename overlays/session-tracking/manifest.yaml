name: session-tracking
version: 1
description: >
  Session continuity tools for Claude Code projects. Installs resume.sh
  (session-start summary) and rotate-session-log.sh (log archival). Installs
  the session-handoff skill at user level by default (--skill-level project for
  per-repo). Creates starter templates for session-log.md, session-context.md,
  and tasks.md. Injects session workflow rules into CLAUDE.md.

# Copied verbatim to target repo. Backed up if dest differs.
files:
  resume.sh: .claude/tools/resume.sh
  rotate-session-log.sh: .claude/tools/rotate-session-log.sh

# Installed to ~/.claude/ by default (--skill-level user).
# Use --skill-level project to install per-repo instead.
# Skipped if already present at the target level (idempotent).
user_files:
  session-handoff/SKILL.md: skills/session-handoff/SKILL.md

# Created from template only if dest does not exist. Never overwrites.
templates:
  session-log.md.tmpl: .claude/session-log.md
  session-context.md.tmpl: .claude/session-context.md
  tasks.md.tmpl: .claude/tasks.md

# Section injected into CLAUDE.md using overlay markers.
merge_sections:
  CLAUDE.md:
    file: sections/claude-md-session-rules.md
    merge_hint: "insert near the top of the file, after any ref-indexing overlay section if present, before project-specific rules"

agent_targets:
  claude-code:
    tools_dir: .claude/tools
    rules_file: CLAUDE.md
