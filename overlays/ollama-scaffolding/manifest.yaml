name: ollama-scaffolding
version: 1
description: >
  Local model usage conventions for projects using the ollama-bridge MCP server.
  Includes: local-model-first rules, verdict protocol (ACCEPTED/IMPROVED/REJECTED),
  imperfect output decision tree, stubs-then-Ollama retry pattern, cold-start grace
  period policy, training data logging convention, and create-persona skill.

# No repo-level files to copy — ollama-bridge is global (user-level ~/.claude/.mcp.json).
files: {}

# Installed to ~/.claude/ by default (--skill-level user).
# Use --skill-level project to install per-repo instead.
# Skipped if already present at the target level (idempotent).
user_files:
  create-persona/SKILL.md: skills/create-persona/SKILL.md

# Ref block template for runtime lookup of retry patterns.
# Created only if missing — user-managed after first install.
templates:
  local-model-retry-patterns.md.tmpl: .claude/overlays/local-model-retry-patterns.md

# Sections to inject into shared files using overlay markers.
merge_sections:
  CLAUDE.md:
    file: sections/claude-md-ollama-rules.md
    merge_hint: "insert immediately after any existing 'Local Model Usage' section (do NOT replace it); if none exists, insert after environment sections"

# Which AI-tool configurations this overlay targets.
agent_targets:
  claude-code:
    rules_file: CLAUDE.md
