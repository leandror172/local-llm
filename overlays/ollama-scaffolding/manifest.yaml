name: ollama-scaffolding
version: 2
description: >
  Local model usage conventions for projects using the ollama-bridge MCP server.
  Includes: local-model-first rules, prompt style, serialization policy, verdict
  protocol (0/1/2), imperfect output decision tree, stubs-then-Ollama retry pattern,
  cold-start grace period, retry budget, context-file rules, training data logging
  convention, and create-persona skill.

# Overlay-owned reference doc copied into the target repo. Fully overlay-owned —
# re-install propagates updates (hash-based: COPY if missing, SKIP if identical,
# overwrite if changed; pass --backup to keep a copy of any local modification).
files:
  local-model-conventions.md: .claude/overlays/local-model-conventions.md

# Installed to ~/.claude/ by default (--skill-level user).
# Use --skill-level project to install per-repo instead.
# Skipped if already present at the target level (idempotent).
user_files:
  create-persona/SKILL.md: skills/create-persona/SKILL.md

# Sections to inject into shared files using overlay markers.
merge_sections:
  CLAUDE.md:
    file: sections/claude-md-ollama-rules.md
    merge_hint: "insert immediately after any existing 'Local Model Usage' section (do NOT replace it); if none exists, insert after environment sections"

# Which AI-tool configurations this overlay targets.
agent_targets:
  claude-code:
    rules_file: CLAUDE.md
