my-go-q3-30b:
  modelfile: modelfiles/go-qwen3-30b.Modelfile
  base_model: qwen3:30b-a3b
  role: Go 1.22+ backend developer (quality ceiling — 30B MoE, hybrid VRAM+RAM)
  temperature: 0.3
  num_ctx: 8192
  tier: full
  status: active
  note: |
    Quality ceiling reference. 19GB MoE on 12GB VRAM+RAM hybrid. Expect ~10-20 tok/s.
    Known Ollama issue: MoE models may show low GPU utilization (github.com/ollama/ollama/issues/10458).
    Used to establish upper-quality bound for DPO pair selection.

